<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🔥 AI 다이어트 플래너 — 나만의 맞춤 식단</title>
<meta name="description" content="체중, 키, 나이를 입력하면 맞춤 식단과 운동 플랜을 무료로 만들어드립니다."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080c10;
  --surface: #0f1318;
  --surface2: #161b22;
  --border: rgba(255,255,255,0.07);
  --accent: #00e5a0;
  --accent2: #00b8ff;
  --red: #ff4d6d;
  --yellow: #ffd166;
  --text: #e8edf2;
  --muted: rgba(232,237,242,0.45);
  --radius: 16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(8,12,16,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:.5px;margin-top:1px;}

/* ── STEPS ── */
.steps{display:flex;gap:0;margin-left:auto;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--surface2);color:var(--muted);border:1px solid var(--border);transition:.3s;position:relative;}
.step-dot.active{background:var(--accent);color:#000;border-color:var(--accent);}
.step-dot.done{background:rgba(0,229,160,.15);color:var(--accent);border-color:rgba(0,229,160,.3);}
.step-dot:not(:last-child)::after{content:'';position:absolute;right:-16px;top:50%;transform:translateY(-50%);width:16px;height:1px;background:var(--border);}
.steps-wrap{display:flex;gap:16px;align-items:center;}

/* ── CONTAINER ── */
.container{max-width:720px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1;}

/* ── SECTION CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;margin-bottom:24px;animation:slideUp .5s ease both;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.section-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px;background:linear-gradient(90deg,#fff,var(--muted));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-full{grid-column:1/-1;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.field input,.field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:.2s;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:rgba(0,229,160,.5);background:rgba(0,229,160,.03);}
.field select option{background:#161b22;}
.input-wrap{position:relative;}
.input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--muted);}

/* ── GENDER TOGGLE ── */
.gender-group{display:flex;gap:8px;}
.gender-btn{flex:1;padding:13px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit;}
.gender-btn.active{background:rgba(0,229,160,.12);border-color:rgba(0,229,160,.4);color:var(--accent);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:15px 28px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:.2s;width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,229,160,.25);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);color:var(--text);}
.btn-row{display:grid;grid-template-columns:1fr 2fr;gap:12px;margin-top:24px;}
.btn-row-single{margin-top:24px;}

/* ── HIDDEN ── */
.hidden{display:none!important;}

/* ── RESULT HERO ── */
.result-hero{background:linear-gradient(135deg,rgba(0,229,160,.08),rgba(0,184,255,.06));border:1px solid rgba(0,229,160,.15);border-radius:24px;padding:32px;margin-bottom:24px;text-align:center;}
.result-hero h2{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
.result-hero p{color:var(--muted);font-size:14px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px;}
.stat{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px 10px;text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--accent);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── TABS ── */
.tab-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.tab{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;background:var(--surface2);color:var(--muted);transition:.2s;}
.tab.active{background:var(--accent);color:#000;}

/* ── MEAL CARD ── */
.meal-block{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;}
.meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.meal-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
.kcal-badge{background:rgba(0,229,160,.12);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.meal-time{font-size:12px;color:var(--muted);}
.food-list{display:flex;flex-wrap:wrap;gap:6px;}
.food-tag{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:rgba(232,237,242,.7);}

/* ── EXERCISE CARD ── */
.exercise-block{background:var(--surface2);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;}
.ex-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ex-name{font-weight:700;font-size:15px;}
.intensity-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.ex-meta{display:flex;gap:16px;font-size:13px;color:var(--muted);margin-bottom:14px;}
.yt-link{display:flex;align-items:center;gap:10px;background:rgba(255,55,55,.08);border:1px solid rgba(255,55,55,.18);border-radius:10px;padding:10px 14px;text-decoration:none;color:#ff6b6b;font-size:13px;font-weight:600;transition:.2s;}
.yt-link:hover{background:rgba(255,55,55,.14);}

/* ── TIP BOX ── */
.tip-box{background:rgba(255,209,102,.06);border:1px solid rgba(255,209,102,.15);border-radius:12px;padding:12px 16px;font-size:13px;color:rgba(232,237,242,.75);line-height:1.6;margin-top:12px;}

/* ── NUTRITION ── */
.nutrition-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.nutrition-card{border-radius:14px;padding:18px;}
.nutrition-card h4{font-size:13px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.nutrition-card p{font-size:12px;color:var(--muted);line-height:1.6;}

/* ── TIPS LIST ── */
.tips-list{display:flex;flex-direction:column;gap:8px;}
.tip-item{display:flex;align-items:flex-start;gap:12px;background:var(--surface2);border-radius:12px;padding:14px 16px;}
.tip-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tip-text{font-size:13px;color:rgba(232,237,242,.8);line-height:1.6;}

/* ── WARNING ── */
.warning{background:rgba(255,165,0,.06);border:1px solid rgba(255,165,0,.18);border-radius:14px;padding:16px;font-size:12px;color:rgba(232,237,242,.6);line-height:1.7;}

/* ── PROGRESS BAR ── */
.progress-wrap{height:4px;background:var(--border);border-radius:4px;margin-bottom:8px;}
.progress-bar{height:4px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s ease;}

/* ── RESPONSIVE ── */
@media(max-width:520px){
  .form-grid{grid-template-columns:1fr;}
  .form-full{grid-column:1;}
  .stat-row{grid-template-columns:1fr 1fr;}
  .nutrition-grid{grid-template-columns:1fr;}
  .btn-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🔥 DIET PLANNER</div>
    <div class="logo-sub">완전 무료 맞춤 다이어트 플래너</div>
  </div>
  <div class="steps-wrap" style="margin-left:auto;">
    <div class="steps" id="stepDots">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-dot" style="margin-left:16px;" id="dot2">2</div>
      <div class="step-dot" style="margin-left:16px;" id="dot3">3</div>
    </div>
  </div>
</header>

<div class="container">

  <!-- ════════ STEP 1 : 기본 정보 ════════ -->
  <div id="step1">
    <div class="card">
      <div class="section-title">기본 정보 입력</div>
      <div class="section-sub">정확한 수치를 입력할수록 더 정밀한 플랜이 만들어져요</div>

      <div class="form-grid">
        <div class="field form-full">
          <label>성별</label>
          <div class="gender-group">
            <button class="gender-btn active" id="btnF" onclick="setGender('여성')">👩 여성</button>
            <button class="gender-btn" id="btnM" onclick="setGender('남성')">👨 남성</button>
          </div>
        </div>
        <div class="field">
          <label>나이</label>
          <div class="input-wrap">
            <input type="number" id="age" placeholder="28" min="10" max="80"/>
            <span class="input-unit">세</span>
          </div>
        </div>
        <div class="field">
          <label>키</label>
          <div class="input-wrap">
            <input type="number" id="height" placeholder="165" min="100" max="220"/>
            <span class="input-unit">cm</span>
          </div>
        </div>
        <div class="field">
          <label>현재 체중</label>
          <div class="input-wrap">
            <input type="number" id="weight" placeholder="65" min="30" max="200"/>
            <span class="input-unit">kg</span>
          </div>
        </div>
        <div class="field">
          <label>목표 체중</label>
          <div class="input-wrap">
            <input type="number" id="targetWeight" placeholder="55" min="30" max="200"/>
            <span class="input-unit">kg</span>
          </div>
        </div>
        <div class="field">
          <label>목표 기간</label>
          <div class="input-wrap">
            <select id="duration">
              <option value="4">4주</option>
              <option value="8">8주</option>
              <option value="12" selected>12주</option>
              <option value="16">16주</option>
              <option value="24">24주</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>직업 / 생활패턴</label>
          <select id="job">
            <option value="office">💼 회사원</option>
            <option value="student">🎒 학생</option>
            <option value="freelance">💻 프리랜서</option>
            <option value="housewife">🏠 주부</option>
            <option value="teacher">📚 교사/교수</option>
            <option value="athlete">🏋️ 운동선수</option>
          </select>
        </div>
        <div class="field form-full">
          <label>평소 활동량</label>
          <select id="activity">
            <option value="1.2">🪑 매우 낮음 (주로 앉아서 생활)</option>
            <option value="1.375" selected>🚶 낮음 (가벼운 활동 주 1~2회)</option>
            <option value="1.55">🏃 보통 (운동 주 3~5회)</option>
            <option value="1.725">💪 활발 (운동 주 6~7회)</option>
            <option value="1.9">🔥 매우 활발 (육체 노동/고강도 훈련)</option>
          </select>
        </div>
        <div class="field form-full">
          <label>식이 제한 / 알레르기 <span style="font-weight:400;text-transform:none;">(선택)</span></label>
          <input type="text" id="restrictions" placeholder="예: 유제품 알레르기, 채식주의, 글루텐프리..."/>
        </div>
      </div>
      <div class="btn-row-single">
        <button class="btn btn-primary" onclick="goStep2()">다음 단계 → 확인하기</button>
      </div>
    </div>
  </div>

  <!-- ════════ STEP 2 : 확인 ════════ -->
  <div id="step2" class="hidden">
    <div class="card">
      <div class="section-title">입력 정보 확인</div>
      <div class="section-sub">아래 정보가 맞으면 플랜 생성 버튼을 눌러주세요</div>
      <div id="confirmList" style="display:flex;flex-direction:column;gap:10px;"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goStep1()">← 수정</button>
        <button class="btn btn-primary" onclick="goStep3()">✨ 플랜 생성하기</button>
      </div>
    </div>
  </div>

  <!-- ════════ STEP 3 : 결과 ════════ -->
  <div id="step3" class="hidden">

    <!-- Hero Summary -->
    <div class="result-hero" id="heroBox"></div>

    <!-- Weekly Schedule -->
    <div class="card">
      <div class="section-title">주간 식단 & 운동 플랜</div>
      <div class="section-sub">탭을 눌러 요일별 스케줄을 확인하세요</div>
      <div class="tab-bar" id="dayTabs"></div>
      <div id="dayContent"></div>
    </div>

    <!-- Nutrition Guide -->
    <div class="card">
      <div class="section-title">영양소 가이드</div>
      <div class="section-sub">하루 권장 영양소 비율</div>
      <div class="nutrition-grid" id="nutritionGrid"></div>
    </div>

    <!-- Lifestyle Tips -->
    <div class="card">
      <div class="section-title">생활 속 실천 팁</div>
      <div class="section-sub">작은 습관이 큰 변화를 만들어요</div>
      <div class="tips-list" id="tipsList"></div>
    </div>

    <!-- Warning -->
    <div class="warning" id="warningBox"></div>

    <div class="btn-row-single" style="margin-top:24px;">
      <button class="btn btn-ghost" onclick="restart()">← 처음으로 돌아가기</button>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let data = { gender:'여성' };
let currentDay = 0;
let plan = null;

// ═══════════════════════════════════════════
//  GENDER
// ═══════════════════════════════════════════
function setGender(g){
  data.gender = g;
  document.getElementById('btnF').classList.toggle('active', g==='여성');
  document.getElementById('btnM').classList.toggle('active', g==='남성');
}

// ═══════════════════════════════════════════
//  STEP NAVIGATION
// ═══════════════════════════════════════════
function showStep(n){
  ['step1','step2','step3'].forEach((id,i)=>{ document.getElementById(id).classList.toggle('hidden', i+1!==n); });
  ['dot1','dot2','dot3'].forEach((id,i)=>{
    const d = document.getElementById(id);
    d.classList.remove('active','done');
    if(i+1 === n) d.classList.add('active');
    else if(i+1 < n) d.classList.add('done');
  });
}

function goStep1(){ showStep(1); }

function goStep2(){
  const age=+document.getElementById('age').value;
  const height=+document.getElementById('height').value;
  const weight=+document.getElementById('weight').value;
  const targetWeight=+document.getElementById('targetWeight').value;
  if(!age||!height||!weight||!targetWeight){ alert('모든 필드를 입력해주세요.'); return; }
  if(targetWeight >= weight){ alert('목표 체중은 현재 체중보다 낮아야 합니다.'); return; }

  data = {
    ...data,
    age, height, weight, targetWeight,
    duration: +document.getElementById('duration').value,
    job: document.getElementById('job').value,
    activity: +document.getElementById('activity').value,
    restrictions: document.getElementById('restrictions').value || '없음'
  };

  const jobLabel = { office:'회사원', student:'학생', freelance:'프리랜서', housewife:'주부', teacher:'교사/교수', athlete:'운동선수' };
  const actLabel = { '1.2':'매우 낮음', '1.375':'낮음', '1.55':'보통', '1.725':'활발', '1.9':'매우 활발' };
  const rows = [
    ['👤 기본 정보', `${data.gender} · ${data.age}세 · ${data.height}cm · ${data.weight}kg`],
    ['🎯 목표', `${data.targetWeight}kg 달성 (${(data.weight-data.targetWeight).toFixed(1)}kg 감량) · ${data.duration}주`],
    ['💼 직업', `${jobLabel[data.job]} · 활동량 ${actLabel[data.activity]}`],
    ['🚫 제한사항', data.restrictions],
  ];
  document.getElementById('confirmList').innerHTML = rows.map(([l,v])=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);">
      <span style="color:var(--muted);font-size:13px;">${l}</span>
      <span style="font-weight:600;font-size:14px;">${v}</span>
    </div>`).join('');
  showStep(2);
}

function goStep3(){
  plan = calcPlan(data);
  renderResult(plan);
  showStep(3);
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){ showStep(1); }

// ═══════════════════════════════════════════
//  CALCULATION ENGINE
// ═══════════════════════════════════════════
function calcBMR(gender, weight, height, age){
  if(gender==='남성') return Math.round(88.362 + 13.397*weight + 4.799*height - 5.677*age);
  return Math.round(447.593 + 9.247*weight + 3.098*height - 4.330*age);
}

function calcPlan(d){
  const bmr = calcBMR(d.gender, d.weight, d.height, d.age);
  const tdee = Math.round(bmr * d.activity);
  const totalLoss = d.weight - d.targetWeight;
  const weeklyLoss = Math.min(totalLoss / d.duration, 0.75); // max 0.75kg/week
  const deficit = Math.round(weeklyLoss * 7700 / 7);
  const dailyCal = Math.max(tdee - deficit, d.gender==='여성' ? 1200 : 1500);
  const bmi = +(d.weight / ((d.height/100)**2)).toFixed(1);

  // protein 체중 1.6~2.0g/kg
  const protein = Math.round(d.weight * 1.8);
  const fat = Math.round(dailyCal * 0.25 / 9);
  const carbs = Math.round((dailyCal - protein*4 - fat*9) / 4);

  // Job-based schedule
  const schedule = buildSchedule(d.job, dailyCal, d.gender, d.activity);

  // Lifestyle tips based on job
  const tips = buildTips(d.job, d.activity, d.gender);

  return { bmr, tdee, dailyCal, bmi, totalLoss, weeklyLoss:+weeklyLoss.toFixed(2), protein, fat, carbs, schedule, tips,
    summary: {
      dailyCal, bmr, tdee, bmi,
      totalWeeks: d.duration,
      weeklyLoss: +weeklyLoss.toFixed(2),
      deficit
    }
  };
}

function buildSchedule(job, dailyCal, gender, activity){
  const days = ['월요일','화요일','수요일','목요일','금요일','토요일','일요일'];
  const tips = [
    '오늘 물을 8잔 이상 마셔보세요. 대사가 활발해집니다!',
    '식사 전 10분 먼저 물 한 컵을 마시면 포만감이 올라가요.',
    '야식 충동이 올 때는 따뜻한 허브티를 마셔보세요.',
    '오늘의 운동에서 마지막 1세트를 더 해보세요!',
    '식사는 천천히 20분 이상 씹어드세요. 포만감이 달라져요.',
    '주말엔 음식 준비를 미리 해두면 실수를 줄일 수 있어요 (Meal Prep).',
    '충분한 수면(7~8시간)이 다이어트의 반입니다!',
  ];
  const meals = mealSets[job] || mealSets.office;
  return days.map((day, i)=>{
    const ex = ytExercises[i % ytExercises.length];
    const b = meals.breakfast[i%3];
    const l = meals.lunch[i%3];
    const d = meals.dinner[i%3];
    const s = meals.snack[i%3];
    // scale calories roughly
    const scale = dailyCal / (b.cal+l.cal+d.cal+s.cal);
    return {
      day, tip: tips[i],
      exercise: ex,
      meals:{
        breakfast:{ ...b, name:'아침식사' },
        lunch:{ ...l, name:'점심식사' },
        dinner:{ ...d, name:'저녁식사' },
        snack:{ ...s, name:'간식' },
      }
    };
  });
}

function renderResult(p){
  const s = p.summary;
  const bmiStatus = s.bmi < 18.5 ? '저체중' : s.bmi < 23 ? '정상' : s.bmi < 25 ? '과체중' : '비만';
  const bmiColor = s.bmi < 18.5 ? '#4facfe' : s.bmi < 23 ? '#2ed573' : s.bmi < 25 ? '#ffa502' : '#ff4d6d';

  document.getElementById('heroBox').innerHTML = `
    <h2>🎯 ${data.targetWeight}KG 목표 달성 플랜</h2>
    <p>${data.duration}주 안에 ${s.totalLoss.toFixed(1)}kg 감량 · 주당 약 ${s.weeklyLoss}kg</p>
    <div class="stat-row">
      <div class="stat"><div class="stat-val">${s.dailyCal}</div><div class="stat-lbl">일일 목표 칼로리</div></div>
      <div class="stat"><div class="stat-val">${s.bmr}</div><div class="stat-lbl">기초대사량 (BMR)</div></div>
      <div class="stat"><div class="stat-val" style="color:${bmiColor}">${s.bmi}</div><div class="stat-lbl">BMI (${bmiStatus})</div></div>
      <div class="stat"><div class="stat-val">${s.deficit}</div><div class="stat-lbl">일일 칼로리 결핍</div></div>
    </div>`;

  // Day tabs
  const days = p.schedule.map(d=>d.day);
  const short = ['월','화','수','목','금','토','일'];
  document.getElementById('dayTabs').innerHTML = days.map((d,i)=>
    `<button class="tab${i===0?' active':''}" onclick="selectDay(${i})">${short[i]}</button>`
  ).join('');

  renderDay(0);

  // Nutrition
  const carbPct = Math.round(p.carbs*4/s.dailyCal*100);
  const protPct = Math.round(p.protein*4/s.dailyCal*100);
  const fatPct  = Math.round(p.fat*9/s.dailyCal*100);
  document.getElementById('nutritionGrid').innerHTML = [
    { icon:'🍚', label:'탄수화물', val:`${p.carbs}g (${carbPct}%)`, desc:'현미밥, 오트밀, 고구마, 통밀빵', bg:'rgba(255,209,102,.06)', border:'rgba(255,209,102,.15)', color:'#ffd166' },
    { icon:'🥩', label:'단백질', val:`${p.protein}g (${protPct}%)`, desc:'닭가슴살, 달걀, 두부, 그릭요거트, 생선', bg:'rgba(255,77,109,.06)', border:'rgba(255,77,109,.15)', color:'#ff4d6d' },
    { icon:'🥑', label:'지방', val:`${p.fat}g (${fatPct}%)`, desc:'아몬드, 아보카도, 올리브오일, 견과류', bg:'rgba(0,229,160,.06)', border:'rgba(0,229,160,.15)', color:'var(--accent)' },
    { icon:'💧', label:'수분', val:`${Math.round(data.weight * 0.033)}L`, desc:'하루 체중(kg) × 33ml가 기준이에요', bg:'rgba(0,184,255,.06)', border:'rgba(0,184,255,.15)', color:'var(--accent2)' },
  ].map(n=>`
    <div class="nutrition-card" style="background:${n.bg};border:1px solid ${n.border};">
      <h4 style="color:${n.color};">${n.icon} ${n.label} — ${n.val}</h4>
      <p>${n.desc}</p>
    </div>`).join('');

  // Tips
  document.getElementById('tipsList').innerHTML = p.tips.map((t,i)=>
    `<div class="tip-item"><div class="tip-num">${i+1}</div><div class="tip-text">${t}</div></div>`
  ).join('');

  document.getElementById('warningBox').innerHTML = `⚠️ <strong>주의사항:</strong> 이 플랜은 일반적인 가이드라인을 기반으로 자동 계산된 정보입니다. 개인의 건강 상태에 따라 적합하지 않을 수 있으니, 기저질환이 있거나 빠른 체중 변화를 경험하는 경우 반드시 의사 또는 영양사와 상담하세요. 주당 0.5~1kg 감량이 건강하고 지속 가능한 속도입니다.`;
}

function selectDay(i){
  currentDay = i;
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  renderDay(i);
}

function renderDay(i){
  const day = plan.schedule[i];
  const mealDefs = [
    { key:'breakfast', icon:'🌅', label:'아침' },
    { key:'lunch', icon:'☀️', label:'점심' },
    { key:'dinner', icon:'🌙', label:'저녁' },
    { key:'snack', icon:'🍎', label:'간식' },
  ];
  const mealsHTML = mealDefs.map(m=>{
    const meal = day.meals[m.key];
    return `<div class="meal-block">
      <div class="meal-header">
        <div class="meal-name">${m.icon} ${m.label}</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="meal-time">⏰ ${meal.time}</span>
          <span class="kcal-badge">${meal.cal}kcal</span>
        </div>
      </div>
      <div class="food-list">${meal.items.map(f=>`<span class="food-tag">${f}</span>`).join('')}</div>
    </div>`;
  }).join('');

  const ex = day.exercise;
  const exHTML = `<div class="exercise-block">
    <div class="ex-header">
      <div class="ex-name">💪 ${ex.name}</div>
      <span style="background:${ex.color}20;color:${ex.color};padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;">${ex.intensity}</span>
    </div>
    <div class="ex-meta">
      <span>⏱ ${ex.duration}</span>
      <span>🔥 ${ex.cal}kcal</span>
    </div>
    <a class="yt-link" href="https://www.youtube.com/results?search_query=${encodeURIComponent(ex.keyword)}" target="_blank" rel="noopener">
      <span style="font-size:20px;">▶️</span>
      <div>
        <div>유튜브 검색: ${ex.keyword}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">추천 채널: ${ex.channel}</div>
      </div>
    </a>
  </div>`;

  const tipHTML = `<div class="tip-box">💡 ${day.tip}</div>`;

  document.getElementById('dayContent').innerHTML = mealsHTML + exHTML + tipHTML;
}
